# Prometheus 告警规则
groups:
  # 任务相关告警
  - name: task_alerts
    interval: 30s
    rules:
      # 任务失败率过高
      - alert: HighTaskFailureRate
        expr: |
          (
            sum(rate(task_total{status="failed"}[5m])) by (task_type)
            /
            sum(rate(task_total[5m])) by (task_type)
          ) > 0.2
        for: 5m
        labels:
          severity: warning
          category: task
        annotations:
          summary: "任务失败率过高"
          description: "任务类型 {{ $labels.task_type }} 的失败率为 {{ $value | humanizePercentage }}，超过 20%"

      # 任务执行时间过长
      - alert: TaskExecutionTooSlow
        expr: |
          histogram_quantile(0.95,
            sum(rate(task_duration_seconds_bucket[5m])) by (task_type, le)
          ) > 600
        for: 10m
        labels:
          severity: warning
          category: task
        annotations:
          summary: "任务执行时间过长"
          description: "任务类型 {{ $labels.task_type }} 的 P95 执行时间为 {{ $value }}秒，超过 10 分钟"

      # 任务队列积压
      - alert: TaskQueueBacklog
        expr: task_queue_length > 100
        for: 5m
        labels:
          severity: warning
          category: task
        annotations:
          summary: "任务队列积压"
          description: "队列 {{ $labels.queue_name }} 中有 {{ $value }} 个待处理任务"

  # Agent 相关告警
  - name: agent_alerts
    interval: 30s
    rules:
      # Agent 错误率过高
      - alert: HighAgentErrorRate
        expr: |
          (
            sum(rate(agent_executions_total{status="failed"}[5m])) by (agent_name)
            /
            sum(rate(agent_executions_total[5m])) by (agent_name)
          ) > 0.3
        for: 5m
        labels:
          severity: critical
          category: agent
        annotations:
          summary: "Agent 错误率过高"
          description: "Agent {{ $labels.agent_name }} 的错误率为 {{ $value | humanizePercentage }}，超过 30%"

      # Agent 执行时间异常
      - alert: AgentExecutionAnomalous
        expr: |
          histogram_quantile(0.95,
            sum(rate(agent_duration_seconds_bucket[5m])) by (agent_name, le)
          ) > 120
        for: 10m
        labels:
          severity: warning
          category: agent
        annotations:
          summary: "Agent 执行时间异常"
          description: "Agent {{ $labels.agent_name }} 的 P95 执行时间为 {{ $value }}秒，超过 2 分钟"

  # API 相关告警
  - name: api_alerts
    interval: 30s
    rules:
      # API 错误率过高
      - alert: HighAPIErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (endpoint)
            /
            sum(rate(http_requests_total[5m])) by (endpoint)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          category: api
        annotations:
          summary: "API 错误率过高"
          description: "端点 {{ $labels.endpoint }} 的 5xx 错误率为 {{ $value | humanizePercentage }}，超过 5%"

      # API 响应时间过慢
      - alert: SlowAPIResponse
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (endpoint, le)
          ) > 2
        for: 10m
        labels:
          severity: warning
          category: api
        annotations:
          summary: "API 响应时间过慢"
          description: "端点 {{ $labels.endpoint }} 的 P95 响应时间为 {{ $value }}秒，超过 2 秒"

      # 活跃连接数过多
      - alert: TooManyActiveConnections
        expr: http_active_connections > 1000
        for: 5m
        labels:
          severity: warning
          category: api
        annotations:
          summary: "活跃连接数过多"
          description: "当前有 {{ $value }} 个活跃连接，可能存在连接泄漏"

  # 数据库相关告警
  - name: database_alerts
    interval: 30s
    rules:
      # 数据库查询时间过长
      - alert: SlowDatabaseQuery
        expr: |
          histogram_quantile(0.95,
            sum(rate(db_query_duration_seconds_bucket[5m])) by (operation, table, le)
          ) > 1
        for: 10m
        labels:
          severity: warning
          category: database
        annotations:
          summary: "数据库查询时间过长"
          description: "表 {{ $labels.table }} 的 {{ $labels.operation }} 操作 P95 时间为 {{ $value }}秒"

      # 数据库连接池耗尽
      - alert: DatabasePoolExhausted
        expr: db_pool_available < 2
        for: 2m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "数据库连接池即将耗尽"
          description: "可用连接数仅剩 {{ $value }} 个"

      # 数据库错误率过高
      - alert: HighDatabaseErrorRate
        expr: rate(db_errors_total[5m]) > 10
        for: 5m
        labels:
          severity: critical
          category: database
        annotations:
          summary: "数据库错误率过高"
          description: "数据库错误率为 {{ $value }} 次/秒"

  # Redis 相关告警
  - name: redis_alerts
    interval: 30s
    rules:
      # Redis 连接断开
      - alert: RedisDisconnected
        expr: redis_connected == 0
        for: 1m
        labels:
          severity: critical
          category: redis
        annotations:
          summary: "Redis 连接断开"
          description: "Redis 连接已断开，请检查 Redis 服务状态"

      # Redis 操作延迟过高
      - alert: HighRedisLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(redis_operation_duration_seconds_bucket[5m])) by (operation, le)
          ) > 0.1
        for: 5m
        labels:
          severity: warning
          category: redis
        annotations:
          summary: "Redis 操作延迟过高"
          description: "Redis {{ $labels.operation }} 操作的 P95 延迟为 {{ $value }}秒"

  # Celery Worker 相关告警
  - name: celery_alerts
    interval: 30s
    rules:
      # Worker 离线
      - alert: CeleryWorkerOffline
        expr: celery_worker_online == 0
        for: 2m
        labels:
          severity: critical
          category: celery
        annotations:
          summary: "Celery Worker 离线"
          description: "没有在线的 Celery Worker，任务无法执行"

      # Worker 数量不足
      - alert: InsufficientCeleryWorkers
        expr: celery_worker_online < 2
        for: 5m
        labels:
          severity: warning
          category: celery
        annotations:
          summary: "Celery Worker 数量不足"
          description: "当前只有 {{ $value }} 个在线 Worker"

  # 业务指标告警
  - name: business_alerts
    interval: 1m
    rules:
      # 待处理反馈过多
      - alert: TooManyPendingFeedback
        expr: sum(feedback_total{status="pending"}) > 50
        for: 30m
        labels:
          severity: info
          category: business
        annotations:
          summary: "待处理反馈过多"
          description: "当前有 {{ $value }} 个待处理反馈，请及时处理"

      # 高优先级反馈未处理
      - alert: HighPriorityFeedbackPending
        expr: sum(feedback_total{status="pending",priority="high"}) > 5
        for: 10m
        labels:
          severity: warning
          category: business
        annotations:
          summary: "高优先级反馈未处理"
          description: "有 {{ $value }} 个高优先级反馈待处理"
