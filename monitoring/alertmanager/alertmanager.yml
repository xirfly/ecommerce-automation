# AlertManager 配置文件
global:
  resolve_timeout: 5m

# 告警路由配置
route:
  group_by: ['alertname', 'category']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    # 关键告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true

    # 警告告警 - 延迟通知
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s

    # 信息告警 - 汇总通知
    - match:
        severity: info
      receiver: 'info-alerts'
      group_wait: 5m
      group_interval: 30m

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default'
    webhook_configs:
      - url: 'http://host.docker.internal:8000/api/webhooks/alertmanager'
        send_resolved: true

  # 关键告警接收器
  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://host.docker.internal:8000/api/webhooks/alertmanager'
        send_resolved: true
        http_config:
          headers:
            X-Alert-Priority: 'critical'

  # 警告告警接收器
  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://host.docker.internal:8000/api/webhooks/alertmanager'
        send_resolved: true
        http_config:
          headers:
            X-Alert-Priority: 'warning'

  # 信息告警接收器
  - name: 'info-alerts'
    webhook_configs:
      - url: 'http://host.docker.internal:8000/api/webhooks/alertmanager'
        send_resolved: true
        http_config:
          headers:
            X-Alert-Priority: 'info'

# 抑制规则
inhibit_rules:
  # 如果有关键告警，抑制相同类别的警告告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['category', 'alertname']

  # 如果有警告告警，抑制相同类别的信息告警
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['category', 'alertname']
